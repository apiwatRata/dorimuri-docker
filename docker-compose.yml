services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: p@ssw0rd
      POSTGRES_DB: default
    volumes:
      # Persist data even if the container is removed
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposes the port to the host machine for local access (e.g., via GUI tools)
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: